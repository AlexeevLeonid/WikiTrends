apiVersion: v1
kind: Namespace
metadata:
  name: wikitrends
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wikitrends-config
  namespace: wikitrends
data:
  ASPNETCORE_ENVIRONMENT: "Production"
  Serilog__WriteTo__1__Args__serverUrl: "http://wikitrends-seq:5341"
  Kafka__BootstrapServers: "kafka:9092"
  Kafka__AutoOffsetReset: "earliest"
  Kafka__EnableAutoCommit: "false"
  Kafka__AutoCommitIntervalMs: "5000"
  Kafka__SessionTimeoutMs: "30000"
  Kafka__MaxPollIntervalMs: "300000"
  Topics__RawEdits: "wiki.raw-edits"
  Topics__EnrichedEdits: "wiki.enriched.v2"
  Topics__ClassifiedEdits: "wiki.classified"
  Topics__TrendUpdates: "wiki.trend-updates"
  Topics__RecalculateBaselineCommands: "wiki.commands.recalculate-baseline"
  Topics__InvalidateCacheCommands: "wiki.commands.invalidate-cache"
  ServiceUrls__AggregatorBaseUrl: "http://wikitrends-aggregator"
  ServiceUrls__AnalyticsBaseUrl: "http://wikitrends-analytics"
  ServiceUrls__ClassifierBaseUrl: "http://wikitrends-classifier"
  ServiceUrls__EnricherBaseUrl: "http://wikitrends-enricher"
  Database__MigrateOnStartup: "false"
---
apiVersion: v1
kind: Secret
metadata:
  name: wikitrends-secrets
  namespace: wikitrends
type: Opaque
stringData:
  ConnectionStrings__PostgreSQL: "Host=postgres;Database=wikitrends;Username=postgres;Password=postgres"
  ConnectionStrings__Redis: "redis:6379"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wikitrends-seq
  namespace: wikitrends
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wikitrends-seq
  template:
    metadata:
      labels:
        app: wikitrends-seq
    spec:
      containers:
        - name: seq
          image: datalust/seq:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: ACCEPT_EULA
              value: "Y"
          ports:
            - name: http
              containerPort: 5341
          volumeMounts:
            - name: seq-data
              mountPath: /data
      volumes:
        - name: seq-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: wikitrends-seq
  namespace: wikitrends
spec:
  type: NodePort
  selector:
    app: wikitrends-seq
  ports:
    - name: http
      port: 5341
      targetPort: 5341
      nodePort: 30041
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wikitrends-collector
  namespace: wikitrends
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wikitrends-collector
  template:
    metadata:
      labels:
        app: wikitrends-collector
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: collector
          image: centerhades/wikitrends-collector:dev
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: wikitrends-config
            - secretRef:
                name: wikitrends-secrets
          env:
            - name: Kafka__GroupId
              value: "wiki-collector-group"
          volumeMounts:
            - name: logs
              mountPath: /app/logs
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: logs
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wikitrends-enricher
  namespace: wikitrends
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wikitrends-enricher
  template:
    metadata:
      labels:
        app: wikitrends-enricher
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: enricher
          image: centerhades/wikitrends-enricher:dev
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: wikitrends-config
            - secretRef:
                name: wikitrends-secrets
          env:
            - name: Kafka__GroupId
              value: "wiki-enricher-group"
            - name: Enricher__ArticleCacheHours
              value: "4"
            - name: Enricher__WorkerCount
              value: "3"
          volumeMounts:
            - name: logs
              mountPath: /app/logs
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: logs
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wikitrends-classifier
  namespace: wikitrends
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wikitrends-classifier
  template:
    metadata:
      labels:
        app: wikitrends-classifier
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: classifier
          image: centerhades/wikitrends-classifier:dev
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: wikitrends-config
            - secretRef:
                name: wikitrends-secrets
          env:
            - name: Kafka__GroupId
              value: "wiki-classifier-group"
            - name: Classifier__WikidataCacheHours
              value: "24"
            - name: Classifier__SeedTopicsOnStartup
              value: "true"
            - name: Classifier__WorkerCount
              value: "6"
            - name: Classifier__SparqlTimeoutSeconds
              value: "8"
            - name: Classifier__SparqlCircuitOpenSeconds
              value: "300"
            - name: Classifier__SparqlCacheHours
              value: "48"
          volumeMounts:
            - name: logs
              mountPath: /app/logs
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: logs
          emptyDir: {}
