name: .NET CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore WikiTrends.sln

      - name: Build
        run: dotnet build WikiTrends.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test WikiTrends.Tests/WikiTrends.Tests.csproj --configuration Release --no-build
